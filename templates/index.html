<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Python Web App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input[type="text"] { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; }
        input[type="submit"] { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; text-align: left; width: 350px; margin: 20px auto; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>📝 My Python Full-Stack App</h2>
        
        <!-- नया काम जोड़ने का फॉर्म -->
        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="यहाँ अपना नया काम लिखें..." required>
            <input type="submit" value="डेटाबेस में सेव करें">
        </form>

                <h3>📋 आपके काम (डेटाबेस से लाइव):</h3>
    <ul style="list-style: none; padding: 0;">
        {% for task in tasks %}
            <li style="background: #eee; margin: 10px auto; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; width: 350px;">
                
                <!-- चेकबॉक्स और टास्क टेक्स्ट -->
                <div style="display: flex; align-items: center; gap: 10px;">
                    <form action="/toggle/{{ task[0] }}" method="POST" style="margin: 0; padding: 0;">
                        <input type="checkbox" onchange="this.form.submit()" {% if task[2] == 1 %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                    </form>
                    
                    <!-- अगर टास्क पूरा है तो लाइन-थ्रू (कटा हुआ) दिखेगा -->
                    <span style="font-size: 16px; color: #333; {% if task[2] == 1 %}text-decoration: line-through; color: #888;{% endif %}">
                        {{ task[1] }}
                    </span>
                </div>

                <!-- डिलीट बटन -->
                <form action="/delete/{{ task[0] }}" method="POST" style="margin: 0; padding: 0;">
                    <button type="submit" style="background-color: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">Delete</button>
                </form>
                
            </li>
        {% endfor %}
    </ul>
